# =============================================================================
# Railway Config-as-Code — Multi-Service Monorepo
# =============================================================================
# This file configures the entire gemini-export project for Railway.
# Place at repo root. Each service section maps to a Railway service.
#
# After creating a Railway project, create empty services and point each
# service's "Config as Code File" to: /railway.toml
# =============================================================================

[project]
name = "gemini-export"

# ---------------------------------------------------------------------------
# Strapi Backend Service
# ---------------------------------------------------------------------------
[services.strapi-backend]
root = "./backend"
builder = "DOCKERFILE"
dockerfilePath = "./backend/Dockerfile"
watchPatterns = ["/backend/**"]
healthcheckPath = "/admin"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[services.strapi-backend.deploy]
startCommand = "npm run start"

# ---------------------------------------------------------------------------
# Next.js Frontend Service
# ---------------------------------------------------------------------------
[services.nextjs-frontend]
root = "."
builder = "DOCKERFILE"
dockerfilePath = "./frontend/Dockerfile"
watchPatterns = ["/frontend/**", "/packages/shared-types/**", "/data/manifests/**"]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[services.nextjs-frontend.deploy]
startCommand = "node server.js"
