services:
  postgres:
    image: postgres:18
    container_name: myorl-pg-rehearsal
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi_rehearsal
    ports:
      - "55532:5432"
    volumes:
      - pgdata-rehearsal:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi_rehearsal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-rehearsal:
    name: myorl-pavlos_pgdata-rehearsal
