# Human-edited decisions for the Babel normalization walkthrough.
#
# This file is the single place to record pair/singleton decisions for rows that
# the deterministic audit (`audit_locale_pairs.py`) left in the `review` bucket
# or in the cross-collision ambiguity set.
#
# The builder (`tools/build_babel_normalization.py`) loads this file together with
# `data/manifests/locale_pair_audit.json` to emit `data/manifests/babel_normalization.json`. The importer
# never reads `babelLanguageLinks` directly.
#
# Rules:
#   - `pairs` entries are reciprocal locale links (web <-> rus).
#   - Every id listed here must exist in `data/source/modx/transformed_resources.json`.
#   - A given web_id or rus_id may appear at most once across pairs + singletons.
#   - Ids NOT listed here and NOT in strict/auto pairs and NOT in the audit's
#     truly_unlocalized buckets will fail the builder's invariants.

