# =============================================================================
# Railway Config-as-Code — Strapi Backend Service
# =============================================================================
# Place in backend/ directory. Link in Railway dashboard via absolute path:
#   Service Settings → Config as Code File → /backend/railway.toml
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["/backend/**"]

[deploy]
startCommand = "npm run start"
healthcheckPath = "/admin"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
