services:
  postgres:
    image: postgres:18
    container_name: myorl-pg-rehearsal
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi_rehearsal
    ports:
      - "55532:5432"
    volumes:
      - pgdata-rehearsal:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi_rehearsal"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: myorl-meili-rehearsal
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY_REHEARSAL:-rehearsal-master-key-do-not-use-in-prod}
    ports:
      - "57701:7700"
    volumes:
      - meilidata_rehearsal:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-rehearsal:
    name: myorl-pavlos_pgdata-rehearsal
  meilidata_rehearsal:
    name: myorl-pavlos_meilidata_rehearsal
