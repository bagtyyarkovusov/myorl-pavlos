services:
  postgres:
    image: postgres:16
    container_name: gemini-pg
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: strapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gemini-strapi
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi
      DATABASE_SSL: "false"
      STRAPI_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/public/uploads:/app/public/uploads
      - ./backend/config:/app/config:ro
      - ./backend/src:/app/src:ro

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        STRAPI_URL: ${STRAPI_URL:-http://strapi:1337}
    container_name: gemini-nextjs
    environment:
      STRAPI_URL: ${STRAPI_URL:-http://strapi:1337}
      STRAPI_TOKEN: ${STRAPI_TOKEN}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      STRAPI_REVALIDATE_SECRET: ${STRAPI_REVALIDATE_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - strapi

volumes:
  pgdata:
