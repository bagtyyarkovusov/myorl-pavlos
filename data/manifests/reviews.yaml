  - { web: 62,  rus: 337, reason: "3 shared ear-lobe assets" }
  - { web: 80,  rus: 387, reason: "alias exact + same template 12; wins over web 11 xml sitemap" }
  - { web: 128, rus: 335, reason: "shared otoplastiki-andres.jpg; parent pair web 61/rus 334" }
  - { web: 129, rus: 336, reason: "parent lineage via web 61/rus 334; overrides audit top-1 rus 262" }
