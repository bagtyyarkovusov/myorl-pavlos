name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: frontend • lint • typecheck • test • coverage • build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/

      - name: Build
        run: npm run build

  backend:
    name: backend • typecheck • build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Strapi build
        run: npm run build

  manifest:
    name: python tools • tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install "PyYAML>=6.0"

      - name: Environment drift detector
        run: python3 tests/test_environments.py

      - name: Port guard tests
        run: python3 tests/test_check_environment.py

      - name: Backup runner tests
        run: python3 tests/test_backup_runner.py

      - name: Migration runner tests
        run: python3 tests/test_migration_runner.py

  docker:
    name: docker • build • compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile .

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config

  e2e:
    name: e2e • playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          STRAPI_URL: http://localhost:1337
          STRAPI_TOKEN: ${{ secrets.STRAPI_PREVIEW_TOKEN || 'dummy' }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
