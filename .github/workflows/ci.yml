name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: frontend • lint • typecheck • test • build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: GitNexus analyze
        working-directory: .
        run: npx gitnexus analyze

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: GitNexus detect-changes
        if: github.event_name == 'pull_request'
        working-directory: .
        run: npx gitnexus detect-changes --scope compare --base-ref "origin/${{ github.base_ref }}"

  backend:
    name: backend • build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Strapi build
        run: npm run build

  manifest:
    name: environment manifest • drift detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install "PyYAML>=6.0"

      - name: Drift detector — manifest vs compose files
        run: python3 tests/test_environments.py

      - name: Port Guard tests
        run: python3 tests/test_check_environment.py
