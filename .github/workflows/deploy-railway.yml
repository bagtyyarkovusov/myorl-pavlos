name: Deploy to Railway

on:
  push:
    branches: [main]

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    name: Deploy Strapi Backend
    needs: ci-gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        run: |
          railway up backend \
            --service ${{ secrets.RAILWAY_BACKEND_SERVICE }} \
            --path-as-root \
            --detach \
            --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for Backend Health
        run: |
          BACKEND_URL="${{ secrets.STRAPI_PUBLIC_URL }}"
          echo "Polling ${BACKEND_URL}/admin ..."
          for i in $(seq 1 36); do
            if curl -sf "${BACKEND_URL}/admin" >/dev/null 2>&1; then
              echo "✓ Backend is healthy"
              exit 0
            fi
            echo "Attempt $i/36 — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "✗ Backend health check timed out after 6 minutes"
          exit 1

  deploy-frontend:
    name: Deploy Next.js Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend
        run: |
          railway up . \
            --service ${{ secrets.RAILWAY_FRONTEND_SERVICE }} \
            --detach \
            --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  smoke-test:
    name: Production Smoke Test
    needs: deploy-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Test Frontend
        run: |
          SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          echo "Smoke testing ${SITE_URL} ..."
          curl -sf --retry 8 --retry-delay 8 "${SITE_URL}" || exit 1
          echo "✓ Frontend reachable"

      - name: Test API
        run: |
          API_URL="${{ secrets.STRAPI_PUBLIC_URL }}"
          echo "Smoke testing ${API_URL}/api ..."
          curl -sf --retry 8 --retry-delay 8 "${API_URL}/api" || exit 1
          echo "✓ API reachable"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Production smoke test failed! Check Railway dashboard logs."
