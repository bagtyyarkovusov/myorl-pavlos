# Canonical tag plan for the Strapi import.
#
# Every distinct tag value used by any page (see distinct_tags in
# injection_readiness.json) must resolve to exactly one entry here. Each
# canonical entry becomes ONE Tag document with two locale versions; each
# russian_only entry becomes a standalone ru-only Tag.
#
# The `aliases_el` / `aliases_ru` lists let us absorb the data-entry noise
# (case variants, Greek strings accidentally assigned to Russian pages,
# synonyms) without polluting the canonical labels. `build_tag_plan.py`
# expands these into the flat `source_value -> slug` map the importer uses.

